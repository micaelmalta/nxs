name: Publish NuGet

on:
  workflow_dispatch:
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0'

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/target
          key: rust-publish-nuget-${{ hashFiles('rust/Cargo.lock') }}
          restore-keys: rust-

      - run: make fixtures FIXTURE_COUNT=1000
      - run: make test-csharp
        env:
          DOTNET_FRAMEWORK: net9.0

      - name: Pack
        working-directory: csharp
        run: dotnet pack -c Release -p:NxsTargetFramework=net9.0 -o ./nupkg

      - name: Publish to NuGet
        working-directory: csharp
        run: dotnet nuget push ./nupkg/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate

      - name: Smoke test (install from registry)
        run: |
          mkdir /tmp/smoke-nuget && cd /tmp/smoke-nuget
          dotnet new console -n SmokeTest
          cd SmokeTest
          dotnet add package NxsFormat
          echo "Smoke test: package installable"
