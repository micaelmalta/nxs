name: Rust

on:
  push:
    paths: ['rust/**', 'examples/**', 'conformance/**', 'Makefile', '.github/workflows/rust.yml']
  pull_request:
    paths: ['rust/**', 'examples/**', 'conformance/**', 'Makefile', '.github/workflows/rust.yml']

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/target
          key: rust-ci-${{ hashFiles('rust/Cargo.lock') }}
          restore-keys: rust-

      - run: make lint-rust
      - run: make test-rust-ci

  fuzz:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@nightly

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/target
          key: rust-nightly-${{ hashFiles('rust/Cargo.lock') }}
          restore-keys: rust-nightly-

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz

      - run: make fuzz FUZZ_TIME=60
