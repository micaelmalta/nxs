name: Publish RubyGems

on:
  push:
    tags: ['v*']

jobs:
  test:
    uses: ./.github/workflows/fixtures.yml

  publish:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'

      - name: Download fixtures
        uses: actions/download-artifact@v4
        with:
          name: fixtures-${{ github.sha }}
          path: js/fixtures/

      - name: Run tests
        run: ruby ruby/test.rb js/fixtures

      - name: Build gem
        working-directory: ruby
        run: gem build nxs-format.gemspec

      - name: Publish to RubyGems
        working-directory: ruby
        run: |
          mkdir -p ~/.gem
          cat > ~/.gem/credentials << EOF
          ---
          :rubygems_api_key: ${{ secrets.RUBYGEMS_API_KEY }}
          EOF
          chmod 0600 ~/.gem/credentials
          gem push nxs-format-*.gem

      - name: Smoke test (install from registry)
        run: |
          gem install nxs-format
          ruby -e "require 'nxs'; puts 'ok'"
