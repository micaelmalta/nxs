name: Kotlin

on:
  push:
    paths: ['kotlin/**', '.github/workflows/kotlin.yml', '.github/workflows/fixtures.yml']
  pull_request:
    paths: ['kotlin/**', '.github/workflows/kotlin.yml', '.github/workflows/fixtures.yml']

jobs:
  fixtures:
    uses: ./.github/workflows/fixtures.yml

  test:
    needs: fixtures
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - uses: gradle/actions/setup-gradle@v4

      - name: Download fixtures
        uses: actions/download-artifact@v4
        with:
          name: fixtures-${{ github.sha }}
          path: js/fixtures/

      - name: Test
        working-directory: kotlin
        run: ./gradlew run --args="../js/fixtures" --no-daemon -q
