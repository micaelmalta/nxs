name: Swift

on:
  push:
    paths: ['swift/**', '.github/workflows/swift.yml', '.github/workflows/fixtures.yml']
  pull_request:
    paths: ['swift/**', '.github/workflows/swift.yml', '.github/workflows/fixtures.yml']

jobs:
  fixtures:
    uses: ./.github/workflows/fixtures.yml

  test:
    needs: fixtures
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Download fixtures
        uses: actions/download-artifact@v4
        with:
          name: fixtures-${{ github.sha }}
          path: js/fixtures/

      - name: Test
        working-directory: swift
        run: swift run nxs-test ../js/fixtures
