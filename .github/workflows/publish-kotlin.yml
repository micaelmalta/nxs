name: Publish Kotlin (Maven Central)

on:
  push:
    tags: ['v*']

jobs:
  test:
    uses: ./.github/workflows/fixtures.yml

  publish:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - uses: gradle/actions/setup-gradle@v4

      - name: Download fixtures
        uses: actions/download-artifact@v4
        with:
          name: fixtures-${{ github.sha }}
          path: js/fixtures/

      - name: Run tests
        working-directory: kotlin
        run: ./gradlew run --args="../js/fixtures" --no-daemon -q

      - name: Publish to Maven Central
        working-directory: kotlin
        run: ./gradlew publishToSonatype closeAndReleaseSonatypeStagingRepository --no-daemon
        env:
          OSSRH_USERNAME: ${{ secrets.OSSRH_USERNAME }}
          OSSRH_PASSWORD: ${{ secrets.OSSRH_PASSWORD }}
          GPG_SIGNING_KEY: ${{ secrets.GPG_SIGNING_KEY }}
          GPG_SIGNING_PASSWORD: ${{ secrets.GPG_SIGNING_PASSWORD }}
