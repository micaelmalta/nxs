name: Publish npm

on:
  workflow_dispatch:
  push:
    tags:
      - 'js/**'

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || github.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/target
          key: rust-publish-npm-${{ hashFiles('rust/Cargo.lock') }}
          restore-keys: rust-

      - run: make fixtures FIXTURE_COUNT=1000
      - run: make test-js

      - name: Require npm token
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "${NPM_TOKEN}" ]; then
            echo "::error::Add repository secret NPM_TOKEN — use a granular access token with Publish for @micaelmalta (CI cannot enter npm 2FA OTP). See https://docs.npmjs.com/about-two-factor-authentication"
            exit 1
          fi

      - name: Publish
        working-directory: js
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Smoke test (install from registry)
        run: |
          mkdir /tmp/smoke-npm && cd /tmp/smoke-npm
          npm init -y
          npm install @micaelmalta/nexus-standard
          node -e "import('@micaelmalta/nexus-standard').then(m => { console.log('ok', Object.keys(m)) })"
