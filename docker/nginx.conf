# Full main config (not conf.d/default.conf): the official image's entrypoint
# writes templates into conf.d/default.conf and can overwrite or shadow a mount there.

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log notice;
pid /run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    access_log /var/log/nginx/access.log;
    sendfile on;
    keepalive_timeout 65;

    upstream app_upstream {
        server app:8000;
        keepalive 32;
    }

    server {
        listen 80 default_server;
        server_name _;
        client_max_body_size 2g;

        # Browser benches use ./fixtures/... → /fixtures/...
        location ^~ /fixtures/ {
            root /var/www;
        }

        # JS demos (COOP/COEP from Python server.py)
        location / {
            proxy_pass http://app_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Connection "";
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
