# Full main config (not conf.d/default.conf): the official image's entrypoint
# writes templates into conf.d/default.conf and can overwrite or shadow a mount there.

user nginx;
worker_processes auto;
error_log /dev/stderr notice;
pid /run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'upstream="$upstream_addr" rt=$request_time urt="$upstream_response_time"';
    access_log /dev/stdout main;

    sendfile on;
    keepalive_timeout 65;

    server {
        listen 80 default_server;
        server_name _;
        client_max_body_size 2g;

        # JS demos
        location / {
            alias /var/www;

            # COOP/COEP headers for SharedArrayBuffer support
            add_header Cross-Origin-Opener-Policy "same-origin";
            add_header Cross-Origin-Embedder-Policy "require-corp";
            add_header Cross-Origin-Resource-Policy "same-origin";
            add_header Cache-Control "no-store";
        }
    }
}
